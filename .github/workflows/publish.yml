name: Shopify Blog Executor
run-name: Shopify Blog Executor (${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.mode) || (vars.WF_ENABLED == 'true' && vars.ALLOW_PUBLISH == 'human_enabled' && 'publish') || 'review' }})

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: false
        default: review
        type: choice
        options:
          - review
          - publish
      start_at:
        description: "1-based index (1, 31, 61, ...)"
        required: false
        default: "1"
        type: string
      max_items:
        description: "Batch size"
        required: false
        default: "1"
        type: string
      reason:
        description: "Why are you running this?"
        required: false
        default: Manual dispatch
        type: string
  schedule:
    - cron: "17,47 * * * *" # every 30 minutes, staggered to reduce burst/rate-limit risk

concurrency:
  group: chatgpt-ui-account
  cancel-in-progress: false

jobs:
  run:
    runs-on: ${{ vars.PUBLISH_USE_SELF_HOSTED == 'true' && vars.CHATGPT_UI_RUNNER_LABELS_JSON != '' && fromJSON(vars.CHATGPT_UI_RUNNER_LABELS_JSON) || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install guardrail dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML
      - name: Export configuration
        run: |
          {
            echo "SHEETS_ID=${{ vars.SHEETS_ID }}"
            echo "SHEETS_RANGE=${{ vars.SHEETS_RANGE }}"
            echo "CONFIG_RANGE=${{ vars.CONFIG_RANGE }}"
            echo "SHOPIFY_SHOP=${{ vars.SHOPIFY_SHOP }}"
            echo "BLOG_HANDLE=${{ vars.BLOG_HANDLE }}"
            echo "AUTHOR=${{ vars.AUTHOR }}"
            echo "OPENAI_MODEL=${{ vars.OPENAI_MODEL }}"
            echo "GH_MODELS_API_BASE=${{ vars.GH_MODELS_API_BASE || 'https://models.github.ai/inference' }}"
            echo "GH_MODELS_MODEL=${{ vars.GH_MODELS_MODEL }}"
            echo "GEMINI_MODEL=${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}"
            echo "GEMINI_IMAGE_MODEL=${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}"
            echo "LLM_PROVIDER_ORDER=${{ github.event_name == 'schedule' && 'chatgpt_ui' || vars.LLM_PROVIDER_ORDER || 'chatgpt_ui,gemini,github_models,openai' }}"
            echo "DISABLE_OPENAI=${{ vars.DISABLE_OPENAI || 'false' }}"
            echo "CHATGPT_UI_ENABLED=true"
            echo "CHATGPT_UI_REQUIRED=true"
            echo "CHATGPT_UI_MODEL=${{ vars.CHATGPT_UI_MODEL || '' }}"
            echo "CHATGPT_UI_MODEL_LABEL=${{ vars.CHATGPT_UI_MODEL_LABEL || '5.4 Thinking' }}"
            echo "CHATGPT_UI_STRICT_MODEL=${{ vars.CHATGPT_UI_STRICT_MODEL || 'true' }}"
            echo "CHATGPT_UI_IMAGE_MODEL_LABEL=${{ vars.CHATGPT_UI_IMAGE_MODEL_LABEL || '5.4' }}"
            echo "CHATGPT_UI_IMAGE_STRICT_MODEL=${{ vars.CHATGPT_UI_IMAGE_STRICT_MODEL || 'false' }}"
            echo "CHATGPT_UI_BASE_URL=${{ vars.CHATGPT_UI_BASE_URL || 'https://chatgpt.com/' }}"
            echo "CHATGPT_UI_NODE_SCRIPT=${{ vars.CHATGPT_UI_NODE_SCRIPT || 'ui-automation/scripts/chatgpt_ui.mjs' }}"
            echo "CHATGPT_UI_HEADLESS=${{ vars.CHATGPT_UI_HEADLESS || 'true' }}"
            echo "CHATGPT_UI_STORAGE_STATE_PATH=$HOME/.chatgpt-storageState.runner.json"
            echo "CHATGPT_UI_RUNNER_LABELS_JSON=${{ vars.CHATGPT_UI_RUNNER_LABELS_JSON || '' }}"
            echo "CHATGPT_UI_BRIDGE_URL=${{ vars.CHATGPT_UI_BRIDGE_URL || '' }}"
            echo "CHATGPT_UI_TIMEOUT_MS=${{ vars.CHATGPT_UI_TIMEOUT_MS || '180000' }}"
            echo "CHATGPT_UI_TIMEOUT_SECONDS=${{ vars.CHATGPT_UI_TIMEOUT_SECONDS || '120' }}"
            echo "CHATGPT_UI_IMAGE_DIRECT=${{ vars.CHATGPT_UI_IMAGE_DIRECT || 'true' }}"
            echo "CHATGPT_UI_IMAGE_TIMEOUT_MS=${{ vars.CHATGPT_UI_IMAGE_TIMEOUT_MS || '240000' }}"
            echo "CONFIG_FILE=${{ vars.CONFIG_FILE }}"
            echo "QUEUE_FILE=${{ vars.QUEUE_FILE }}"
            echo "QUEUE_URL=${{ vars.QUEUE_URL }}"
            echo "LOCAL_HEARTBEAT_FILE=${{ vars.LOCAL_HEARTBEAT_FILE || 'local_heartbeat.json' }}"
            echo "LOCAL_HEARTBEAT_URL=${{ vars.LOCAL_HEARTBEAT_URL }}"
            echo "LOCAL_HEARTBEAT_MAX_AGE_MINUTES=${{ vars.LOCAL_HEARTBEAT_MAX_AGE_MINUTES || '15' }}"
            echo "MIN_INLINE_IMAGES=${{ vars.MIN_INLINE_IMAGES || '3' }}"
            echo "MIN_ARTICLE_WORDS=${{ vars.MIN_ARTICLE_WORDS || '1400' }}"
            echo "MAX_ARTICLE_WORDS=${{ vars.MAX_ARTICLE_WORDS || '2500' }}"
            echo "MIN_H2_COUNT=${{ vars.MIN_H2_COUNT || '6' }}"
            echo "MIN_EXTERNAL_LINKS=${{ vars.MIN_EXTERNAL_LINKS || '5' }}"
            echo "MIN_BLOCKQUOTES=${{ vars.MIN_BLOCKQUOTES || '2' }}"
            echo "PREFER_EXISTING_INLINE_IMAGES=${{ vars.PREFER_EXISTING_INLINE_IMAGES || 'true' }}"
            echo "DAILY_PUBLISH_CAP=${{ vars.DAILY_PUBLISH_CAP || '50' }}"
            echo "SHEETS_ENABLED=${{ vars.SHEETS_ENABLED || 'true' }}"
            echo "WF_ENABLED=${{ vars.WF_ENABLED }}"
            echo "ALLOW_PUBLISH=${{ vars.ALLOW_PUBLISH }}"
            echo "MODE=${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.mode) || (vars.WF_ENABLED == 'true' && vars.ALLOW_PUBLISH == 'human_enabled' && 'publish') || 'review' }}"
            echo "DISPATCH_REASON=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reason || format('auto run {0}', github.run_id) }}"
          } >> "$GITHUB_ENV"
      - name: Export batch window
        run: |
          echo "START_AT=${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.start_at) || vars.START_AT || '1' }}" >> "$GITHUB_ENV"
          echo "MAX_ITEMS=${{ (github.event_name == 'schedule' && '1') || (github.event_name == 'workflow_dispatch' && github.event.inputs.max_items) || vars.MAX_ITEMS || '1' }}" >> "$GITHUB_ENV"
      - name: Inject secrets
        run: |
          {
            echo "SHOPIFY_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "GH_MODELS_API_KEY=${{ secrets.GH_MODELS_API_KEY }}"
            echo "GITHUB_MODELS_API_KEY=${{ secrets.GITHUB_MODELS_API_KEY }}"
            echo "CHATGPT_UI_BRIDGE_TOKEN=${{ secrets.CHATGPT_UI_BRIDGE_TOKEN }}"
            echo "CHATGPT_UI_STORAGE_STATE_B64=${{ secrets.CHATGPT_UI_STORAGE_STATE_B64 }}"
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
            echo "GOOGLE_AI_STUDIO_API_KEY=${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}"
            echo "FALLBACK_GEMINI_API_KEY=${{ secrets.FALLBACK_GEMINI_API_KEY }}"
            echo "FALLBACK_GOOGLE_AI_STUDIO_API_KEY=${{ secrets.FALLBACK_GEMINI_API_KEY }}"
            echo "SECOND_FALLBACK_GEMINI_API_KEY=${{ secrets.SECOND_FALLBACK_GEMINI_API_KEY }}"
            echo "SECOND_FALLBACK_GOOGLE_AI_STUDIO_API_KEY=${{ secrets.SECOND_FALLBACK_GOOGLE_AI_STUDIO_API_KEY }}"
            echo "THIRD_FALLBACK_GEMINI_API_KEY=${{ secrets.THIRD_FALLBACK_GEMINI_API_KEY }}"
            echo "THIRD_FALLBACK_GOOGLE_AI_STUDIO_API_KEY=${{ secrets.THIRD_FALLBACK_GOOGLE_AI_STUDIO_API_KEY }}"
            echo "FOURTH_FALLBACK_GEMINI_API_KEY=${{ secrets.FOURTH_FALLBACK_GEMINI_API_KEY }}"
            echo "FOURTH_FALLBACK_GOOGLE_AI_STUDIO_API_KEY=${{ secrets.FOURTH_FALLBACK_GOOGLE_AI_STUDIO_API_KEY }}"
            echo "FIFTH_FALLBACK_GEMINI_API_KEY=${{ secrets.FIFTH_FALLBACK_GEMINI_API_KEY }}"
            echo "FIFTH_FALLBACK_GOOGLE_AI_STUDIO_API_KEY=${{ secrets.FIFTH_FALLBACK_GOOGLE_AI_STUDIO_API_KEY }}"
            echo "SIXTH_FALLBACK_GEMINI_API_KEY=${{ secrets.SIXTH_FALLBACK_GEMINI_API_KEY }}"
            echo "SIXTH_FALLBACK_GOOGLE_AI_STUDIO_API_KEY=${{ secrets.SIXTH_FALLBACK_GOOGLE_AI_STUDIO_API_KEY }}"
          } >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Preflight ChatGPT UI auth readiness
        if: env.CHATGPT_UI_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          bridge="${CHATGPT_UI_BRIDGE_URL:-}"
          storage="${CHATGPT_UI_STORAGE_STATE_B64:-}"
          storage_path="${CHATGPT_UI_STORAGE_STATE_PATH:-}"
          strict="${CHATGPT_UI_REQUIRED:-false}"
          runner_labels="${CHATGPT_UI_RUNNER_LABELS_JSON:-}"
          has_storage_path="false"

          if [ -n "$storage_path" ] && [ -f "$storage_path" ]; then
            has_storage_path="true"
          fi

          if [ -z "$bridge" ] && [ -z "$storage" ] && [ "$has_storage_path" != "true" ]; then
            echo "ERROR: CHATGPT_UI is enabled but neither bridge, persisted storage path, nor CHATGPT_UI_STORAGE_STATE_B64 is configured."
            echo "Set a bridge URL/token OR provide a valid runner storage-state path/secret for direct UI automation."
            exit 1
          fi

          # Direct UI mode on hosted runners is frequently blocked by anti-bot checks.
          if [ -z "$bridge" ] && [ -z "$runner_labels" ]; then
            echo "ERROR: Direct ChatGPT UI mode requires a dedicated self-hosted runner."
            echo "Set vars.CHATGPT_UI_RUNNER_LABELS_JSON (for example: [\"self-hosted\",\"linux\",\"chatgpt-ui\"]) or configure CHATGPT_UI_BRIDGE_URL."
            exit 1
          fi

          if [ "$strict" = "true" ] && [ -z "$bridge" ] && [ -z "$storage" ] && [ "$has_storage_path" != "true" ]; then
            echo "ERROR: CHATGPT_UI_REQUIRED=true requires bridge, persisted storage path, or storage-state secret."
            exit 1
          fi

      - name: Install Playwright Chromium (ChatGPT UI)
        if: env.CHATGPT_UI_ENABLED == 'true' && env.CHATGPT_UI_BRIDGE_URL == ''
        continue-on-error: true
        shell: bash
        run: |
          # Skip if Chromium is already installed
          if npx playwright install --dry-run chromium 2>&1 | grep -q "already installed"; then
            echo "Chromium already installed, skipping"
            exit 0
          fi
          # Hide cnf-update-db (uses apt_pkg which breaks with setup-python)
          sudo mv /usr/lib/cnf-update-db /usr/lib/cnf-update-db.bak 2>/dev/null || true
          # Tell needrestart to list-only (don't restart services)
          sudo mkdir -p /etc/needrestart/conf.d
          echo '$nrconf{restart} = "l";' | sudo tee /etc/needrestart/conf.d/no-restart.conf >/dev/null 2>/dev/null || true
          npx playwright install --with-deps chromium
          sudo mv /usr/lib/cnf-update-db.bak /usr/lib/cnf-update-db 2>/dev/null || true
          sudo rm -f /etc/needrestart/conf.d/no-restart.conf 2>/dev/null || true

      - name: Prepare ChatGPT UI runner state
        if: env.CHATGPT_UI_ENABLED == 'true' && env.CHATGPT_UI_BRIDGE_URL == ''
        shell: bash
        run: |
          set -euo pipefail
          state_path="${CHATGPT_UI_STORAGE_STATE_PATH:-$HOME/.chatgpt-storageState.runner.json}"
          mkdir -p "$(dirname "$state_path")"

          probe() {
            printf '' | CHATGPT_UI_PROBE_ONLY=true CHATGPT_UI_RESPONSE_TIMEOUT_SECONDS=45 CHATGPT_UI_STORAGE_STATE_PATH="$state_path" node "$CHATGPT_UI_NODE_SCRIPT" >/tmp/chatgpt-ui-probe.json
          }

          if [ -f "$state_path" ]; then
            echo "Found persisted runner storage state: $state_path"
            if probe; then
              echo "Runner storage state probe passed"
              exit 0
            fi
            echo "Persisted runner storage state probe failed; attempting refresh from secret"
          fi

          if [ -z "${CHATGPT_UI_STORAGE_STATE_B64:-}" ]; then
            echo "ERROR: Missing CHATGPT_UI_STORAGE_STATE_B64 and persisted runner storage state is unavailable or invalid."
            exit 1
          fi

          xvfb-run -a env CHATGPT_UI_STORAGE_STATE_OUT="$state_path" node ui-automation/scripts/chatgpt_refresh_storage_state.mjs
          probe
      - name: Google creds -> file (for Sheets ADC)
        shell: bash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > $RUNNER_TEMP/google-credentials.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-credentials.json" >> $GITHUB_ENV
            echo "SHEETS_ENABLED=true" >> $GITHUB_ENV
          else
            echo "WARNING: Missing secret GOOGLE_SERVICE_ACCOUNT_JSON; Sheets updates disabled."
            echo "SHEETS_ENABLED=false" >> $GITHUB_ENV
          fi
      - name: Build executor
        env:
          NODE_OPTIONS: --max-old-space-size=1024
        run: |
          rm -rf apps/executor/dist
          npm run --workspace apps/executor build
      - name: Check local heartbeat
        run: |
          set -euo pipefail
          max_age_min="${LOCAL_HEARTBEAT_MAX_AGE_MINUTES:-15}"
          heartbeat_ts=""
          if [ -n "${LOCAL_HEARTBEAT_URL:-}" ]; then
            echo "Checking heartbeat URL: $LOCAL_HEARTBEAT_URL"
            heartbeat_ts=$(python -c "import json, os, urllib.request; url=os.environ.get('LOCAL_HEARTBEAT_URL','');\ntry:\n  resp=urllib.request.urlopen(url,timeout=10)\n  data=json.loads(resp.read().decode('utf-8'))\n  print(str(data.get('timestamp','')).strip())\nexcept Exception:\n  print('', end='')\n")
          elif [ -f "${LOCAL_HEARTBEAT_FILE:-local_heartbeat.json}" ]; then
            echo "Checking heartbeat file: ${LOCAL_HEARTBEAT_FILE:-local_heartbeat.json}"
            heartbeat_ts=$(python -c "import json, os; path=os.environ.get('LOCAL_HEARTBEAT_FILE','local_heartbeat.json');\ntry:\n  data=json.load(open(path,'r',encoding='utf-8'))\n  print(str(data.get('timestamp','')).strip())\nexcept Exception:\n  print('', end='')\n")
          fi

          active="false"
          if [ -n "$heartbeat_ts" ]; then
            now=$(date +%s)
            age=$((now - heartbeat_ts))
            max_age_sec=$((max_age_min * 60))
            if [ "$age" -ge 0 ] && [ "$age" -le "$max_age_sec" ]; then
              active="true"
            fi
            echo "Heartbeat age: ${age}s (max ${max_age_sec}s)"
          fi
          echo "LOCAL_HEARTBEAT_ACTIVE=$active" >> "$GITHUB_ENV"
          if [ "$active" = "true" ]; then
            echo "Local runner active; skipping executor run."
          fi
      - name: Run executor (${{ env.MODE }}) - fresh session per blog (single item)
        if: env.LOCAL_HEARTBEAT_ACTIVE != 'true'
        env:
          MODE: ${{ env.MODE }}
          DISPATCH_REASON: ${{ env.DISPATCH_REASON }}
        run: |
          set -euo pipefail

          total=${MAX_ITEMS:-1}
          start=${START_AT:-1}
          cap=${DAILY_PUBLISH_CAP:-50}
          i=0
          while [ $i -lt $total ]; do
            if [ "${MODE:-review}" = "publish" ]; then
              published_today=$(node scripts/count_published_today_utc.js)
              echo "Published today (UTC): $published_today / $cap"
              if [ "$published_today" -ge "$cap" ]; then
                echo "Daily publish cap reached ($published_today >= $cap). Stopping run."
                break
              fi
            fi

            export START_AT=$((start + i))
            export MAX_ITEMS=1
            echo "Running executor item $((i+1))/$total (START_AT=$START_AT, MAX_ITEMS=$MAX_ITEMS)"
            node apps/executor/dist/index.js
            i=$((i+1))
          done
      - name: Upload previews + summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executor-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/executor/out/**
            out/**

      - name: Guardrail check
        if: always()
        env:
          EXTRA_ALLOWED_PATHS: apps/executor/out/,out/
        run: |
          if [ -f "scripts/check_allowed_changes.py" ]; then
            python scripts/check_allowed_changes.py
          else
            echo "Guardrail script missing; skipping guardrail check."
          fi
